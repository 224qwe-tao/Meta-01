<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Image Metadata Viewer</title>
  <meta name="description" content="A browser-only image metadata viewer for PNG, JPG/JPEG, WEBP and AI generation information." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Local browser tool</p>
        <h1>AI Image Metadata Viewer</h1>
        <p class="subtitle">讀取 PNG / JPG / WEBP 圖片中的一般 metadata、Stable Diffusion 參數、ComfyUI workflow，以及 NovelAI / Stealth PNGInfo 資料。</p>
      </div>
      <div class="privacy-card">
        <strong>Privacy</strong>
        <span>圖片只在你的瀏覽器內處理，不會上傳到伺服器。</span>
      </div>
    </section>

    <section id="dropZone" class="drop-zone" tabindex="0" aria-label="Drop image files here">
      <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" multiple hidden />
      <div class="drop-icon">⇪</div>
      <h2>拖放圖片到這裡</h2>
      <p>也可以貼上剪貼簿圖片，或按下面按鈕選擇檔案。</p>
      <div class="actions">
        <button id="chooseBtn" class="primary" type="button">選擇圖片</button>
        <button id="clearBtn" class="secondary" type="button">清空結果</button>
      </div>
      <p id="status" class="status" role="status">支援 PNG、JPG/JPEG、WEBP。最新結果會顯示在最上方。</p>
    </section>

    <section class="result-header">
      <div>
        <p class="eyebrow">Results</p>
        <h2>提取結果</h2>
      </div>
      <span id="counter" class="counter">0 files</span>
    </section>

    <section id="results" class="results" aria-live="polite"></section>
  </main>

  <template id="resultTemplate">
    <article class="result-card">
      <div class="preview-wrap">
        <img class="preview" alt="Image preview" />
      </div>
      <div class="result-main">
        <div class="result-title-row">
          <div>
            <h3 class="file-name"></h3>
            <p class="file-note"></p>
          </div>
          <div class="card-actions">
            <button class="copy-btn secondary" type="button">複製 JSON</button>
            <button class="download-btn secondary" type="button">下載 TXT</button>
          </div>
        </div>
        <div class="summary-tags"></div>
        <details open>
          <summary>格式化資料</summary>
          <pre class="pretty-output"></pre>
        </details>
        <details>
          <summary>Raw JSON</summary>
          <pre class="raw-output"></pre>
        </details>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
