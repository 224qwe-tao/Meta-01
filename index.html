<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NovelAI 圖片元數據整理器</title>
  <meta name="description" content="Browser-only NovelAI / Stable Diffusion image metadata viewer for PNG, JPG and WEBP." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="panel intro">
      <div>
        <h1>NovelAI 圖片元數據整理器 <span>V20260426-NAI45-fix</span></h1>
        <p>選擇、拖放或貼上 PNG/JPG/WEBP 圖片。程式會優先整理 NovelAI / Stealth PNGInfo metadata，並把 prompt、negative prompt、seed、sampler 等資料分開顯示。</p>
      </div>
      <div class="privacy">本工具只在瀏覽器內處理圖片，不會上傳到伺服器。</div>
    </section>

    <section id="dropZone" class="drop-zone" tabindex="0" aria-label="drop image files here">
      <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" multiple hidden />
      <p class="drop-title">將圖片拖放到此處</p>
      <p class="drop-small">或者</p>
      <button id="chooseBtn" class="btn primary" type="button">選擇文件</button>
      <p id="status" class="status" role="status">支援 PNG、JPG/JPEG、WEBP。可貼上剪貼簿圖片。</p>
    </section>

    <div class="toolbar">
      <strong>結果</strong>
      <div>
        <span id="counter">0 個檔案</span>
        <button id="clearBtn" class="btn ghost" type="button">清空</button>
      </div>
    </div>

    <section id="results" class="results" aria-live="polite"></section>
  </main>

  <template id="resultTemplate">
    <article class="result-card">
      <header class="card-head">
        <div>
          <h2 class="file-name"></h2>
          <p class="file-note"></p>
        </div>
        <div class="card-actions">
          <button class="copy-prompt-btn btn tiny" type="button">複製文本</button>
          <button class="copy-json-btn btn tiny" type="button">複製 JSON</button>
          <button class="download-btn btn tiny" type="button">下載 TXT</button>
        </div>
      </header>

      <div class="card-body">
        <img class="preview" alt="圖片預覽" />

        <div class="main-info">
          <div class="summary-grid"></div>

          <section class="block prompt-section">
            <div class="block-title-row">
              <h3>AI 繪圖機器人指令：</h3>
            </div>
            <pre class="prompt-output"></pre>
          </section>

          <section class="block raw-section">
            <div class="block-title-row">
              <h3>原始 LSB / Metadata JSON 數據：</h3>
            </div>
            <pre class="raw-output collapsed"></pre>
            <button class="show-more-btn" type="button">顯示全部</button>
          </section>

          <details class="extra-detail">
            <summary>檔案與 Chunk 資料</summary>
            <pre class="technical-output"></pre>
          </details>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
